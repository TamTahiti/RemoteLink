name: Build RemoteLink APK

# Manual trigger configuration
on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Select Build Variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java (JDK 17 is standard for modern Android/AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Setup Android SDK & Accept Licenses
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build the APK
      # Note: If building 'release', ensure you have signingConfigs configured 
      # in your app/build.gradle.kts or pass keystore secrets via env vars.
      - name: Build APK
        run: ./gradlew assemble${{ github.event.inputs.build_variant }} --no-daemon

      # 6. Upload the APK as a GitHub Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteLink-${{ github.event.inputs.build_variant }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.build_variant }}/*.apk
          retention-days: 7
          if-no-files-found: error
